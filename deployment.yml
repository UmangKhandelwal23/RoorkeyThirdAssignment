apiVersion: apps/v1
kind: Deployment
metadata:
  name: myweb
spec:
  replicas: 5
  selector:
   matchLabels:
    app: frontend
  template:
   metadata:
    labels:
     app: frontend
   spec:
    containers:
     - name: nginx
       image: umangkhandelwal/roorkeythird:v2
       imagePullPolicy: Always
       ports:
        - containerPort: 80


